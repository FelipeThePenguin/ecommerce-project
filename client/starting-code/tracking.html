<!DOCTYPE html>
<html>

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Tracking Page</title>
 
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
 
 <link rel="stylesheet" href="/styles/globals.css">
 <link rel="stylesheet" href="/styles/header.css">

 <link rel="stylesheet" href="/styles/pages/tracking.css">
</head>

<body>
 <header class="ecommerce-header">
  <div class="left-section">
   <a class="index-link" href="index.html">
    <img src="assets/images/logos/title-logo-white.svg" class="title-logo hide-on-mobile"/>
    <img src="assets/images/logos/logo-white.svg" class="title-logo hide-on-desktop"/>
   </a>
  </div>
  <div class="middle-section">
   <input class="search-input" />
   <button class="search-button">
    <img src="assets/images/icons/header/search-icon.svg" class="search-icon"/>
   </button>
  </div>
  <div class="right-section">
   <a class="filter-button hide-on-mobile">
    <img src="assets/images/icons/header/filter-icon.svg" class="filter-icon"/>
   </a>
   <a href="orders.html" class="hide-on-mobile">
    Orders
   </a>
   <a href="checkout.html" class="hide-on-mobile">
    <div class="cart-quantity">
     <img src="assets/images/icons/cart-icon.svg" class="cart-icon"/>
     <span class="cart-quantity-number">3</span>
    </div>
    <span>Cart</span>
   </a>
   <a class="hide-on-desktop">
    <img src="assets/images/icons/header/hamburger-icon.svg" class="hamburger-icon"/>
   </a>
  </div>
 </header>

 <main class="tracking-container">
  <div>
   <a href="orders.html" class="primary-span tracking-orders-link">View all orders</a>
  </div>
  <h2>Arriving on Wednesday, June 10</h2>
  <span>Airi Plushie - Large</span>
  <span>Quantity: 1</span>
  <img src="assets/images/products/airi-plush.jpeg" class="product-image" />
  <div class="tracking-status-container">
   <div class="tracking-status">
    <span class="tracking-span current-status">Preparing</span>
    <span class="tracking-span">Shipped</span>
    <span class="tracking-span">Delivered</span>
   </div>
   <div class="tracking-bar-container">
    <div class="tracking-bar"></div>
   </div>
  </div>
 </main>
</body>

</html>
