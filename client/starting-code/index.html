<!DOCTYPE html>
<html>

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Ecommerce Page</title>
 
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
 
 <link rel="stylesheet" href="/styles/globals.css">
 <link rel="stylesheet" href="/styles/header.css">
 
 <link rel="stylesheet" href="/styles/pages/index.css">
</head>

<body>
 <header class="ecommerce-header">
  <div class="left-section">
   <a class="index-link" href="index.html">
    <img src="assets/images/logos/title-logo-white.svg" class="title-logo hide-on-mobile"/>
    <img src="assets/images/logos/logo-white.svg" class="title-logo hide-on-desktop"/>
   </a>
  </div>
  <div class="middle-section">
   <input class="search-input" />
   <button class="search-button">
    <img src="assets/images/icons/header/search-icon.svg" class="search-icon"/>
   </button>
  </div>
  <div class="right-section">
   <a class="filter-button hide-on-mobile">
    <img src="assets/images/icons/header/filter-icon.svg" class="filter-icon"/>
   </a>
   <a href="orders.html" class="hide-on-mobile">
    Orders
   </a>
   <a href="checkout.html" class="hide-on-mobile">
    <div class="cart-quantity">
     <img src="assets/images/icons/cart-icon.svg" class="cart-icon"/>
     <span class="cart-quantity-number">3</span>
    </div>
    <span>Cart</span>
   </a>
   <a class="hide-on-desktop">
    <img src="assets/images/icons/header/hamburger-icon.svg" class="hamburger-icon"/>
   </a>
  </div>
 </header>
 
 <main class="products-grid">
   <div class="product-details">
    <div class="product-image-container">
     <img src="assets/images/products/airi-plush.jpeg" class="product-image" />
    </div>
    <div class="product-contents">
     <div class="product-name limit-text-to-2-lines">
      Airi Plush - Large
     </div>
     <div>
      <div class="product-ratings">
       <img src="assets/images/ratings/50.svg" class="product-ratings-stars" />
       <span class="product-ratings-count">4567</span>
      </div>
      <div class="product-price">
       $49.99
      </div>
      <div class="select-wrapper">
       <select class="primary-select">
        <option selected>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
       </select>
       <img src="assets/images/icons/arrow-icon.svg" class="primary-select-icon" />
      </div>
     </div>
    </div>
    <div class="product-actions">
     <img src="assets/images/icons/added-message.svg" class="added-message" />
     <button class="primary-button add-to-cart-button">Add to Cart</button>
    </div>
   </div>
   <div class="product-details">
    <div class="product-image-container">
     <img src="assets/images/products/miku-plush.jpeg" class="product-image" />
    </div>
    <div class="product-contents">
     <div class="product-name limit-text-to-2-lines">
      Hatsune Miku Plushie - Limited Edition Japan
     </div>
     <div>
      <div class="product-ratings">
       <img src="assets/images/ratings/40.svg" class="product-ratings-stars" />
       <span class="product-ratings-count">1234</span>
      </div>
      <div class="product-price">
       $39.99
      </div>
      <div class="select-wrapper">
       <select class="primary-select">
        <option selected>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
       </select>
       <img src="assets/images/icons/arrow-icon.svg" class="primary-select-icon" />
      </div>
     </div>
    </div>
    <div class="product-actions">
     <img src="assets/images/icons/added-message.svg" class="added-message" />
     <button class="primary-button add-to-cart-button">Add to Cart</button>
    </div>
   </div>
   <div class="product-details">
    <div class="product-image-container">
      <img src="assets/images/products/shizuku-plush.jpeg" class="product-image" />
    </div>
    <div class="product-contents">
     <div class="product-name limit-text-to-2-lines">
      Shizuku Plushie - Small
     </div>
     <div>
      <div class="product-ratings">
       <img src="assets/images/ratings/45.svg" class="product-ratings-stars" />
       <span class="product-ratings-count">890</span>
      </div>
      <div class="product-price">
       $24.99
      </div>
      <div class="select-wrapper">
       <select class="primary-select">
        <option selected>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
       </select>
       <img src="assets/images/icons/arrow-icon.svg" class="primary-select-icon" />
      </div>
     </div>
    </div>
   <div class="product-actions">
     <img src="assets/images/icons/added-message.svg" class="added-message" />
     <button class="primary-button add-to-cart-button">Add to Cart</button>
    </div>
   </div>
 </main>
</body>

</html>
